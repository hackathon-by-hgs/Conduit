name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # `prisma generate` writes the client into src/, which typecheck and build both need.
      - run: pnpm db:generate

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  # The integration suite needs real Postgres + Redis — the point of those tests is that the
  # DB constraint (not an app-level check) is what enforces idempotency, which an in-memory
  # fake cannot prove.
  integration:
    name: integration (postgres + redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit
          POSTGRES_DB: conduit
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U conduit -d conduit"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://conduit:conduit@localhost:5432/conduit
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @conduit/api exec prisma migrate deploy
      - run: pnpm --filter @conduit/api exec vitest run --config vitest.integration.config.ts
